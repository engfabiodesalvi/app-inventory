#version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    #image: php:8.3-fpm #laravelphp/php-fpm:8.1
    container_name: inventory_app_php
    volumes:
      - ./:/var/www      
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  node:
    image: node:20
    container_name: inventory_app_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"   
    command: sh -c "npm install && npm run dev"
    #tty: true


  webserver:
    image: nginx:alpine
    container_name: inventory_app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: inventory_app_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306" #"3306:3306"

  redis:
    image: redis:alpine
    container_name: inventory_app_redis
    ports:
      - "6379:6379"
networks:
  default:
    driver: bridge
